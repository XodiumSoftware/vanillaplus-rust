site_name: PumpkinPlus
site_description: Documentation for the PumpkinPlus Pumpkin Minecraft plugin
site_url: http://xodiumsoftware.github.io/PumpkinPlus
repo_name: XodiumSoftware/PumpkinPlus
repo_url: https://github.com/XodiumSoftware/PumpkinPlus
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: orange
    accent: amber
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Modules:
      - modules/index.md
      - Locator: modules/locator.md
      - MOTD: modules/motd.md
      - Player: modules/player.md
      - Tablist: modules/tablist.md
  - Commands & Permissions: commands.md
  - Configuration: configuration.md
